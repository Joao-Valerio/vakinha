<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><title>Atualização da campanha</title></head>
<body style="font-family: Inter, sans-serif; background: #f9fafb; margin: 0; padding: 0;">
<div style="max-width: 480px; margin: 40px auto; background: #ffffff; border-radius: 16px; overflow: hidden; border: 1px solid #e5e7eb;">
  <div style="background: #10b981; padding: 32px 40px;">
    <h1 style="color: white; font-size: 22px; margin: 0; font-weight: 700;">Vakinha IA</h1>
  </div>
  <div style="padding: 40px;">
    <p style="color: #6b7280; font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; margin: 0 0 8px;">Atualização da campanha</p>
    <h2 style="color: #111827; font-size: 18px; margin: 0 0 20px;">{{ campaign.title }}</h2>
    <div style="background: #f9fafb; border-radius: 12px; padding: 20px; margin-bottom: 24px;">
      <p style="margin: 0; font-size: 14px; color: #374151; line-height: 1.6;">{{ update.content }}</p>
    </div>
    <p style="color: #9ca3af; font-size: 12px; margin: 0 0 24px;">Publicado em {{ update.created_at|date:"d/m/Y" }}</p>
  </div>
  <div style="padding: 20px 40px; border-top: 1px solid #f3f4f6; text-align: center;">
    <p style="color: #9ca3af; font-size: 12px; margin: 0;">Vakinha IA · Plataforma de arrecadação coletiva</p>
  </div>
</div>
</body>
</html>
