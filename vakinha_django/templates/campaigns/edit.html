{% extends "base.html" %}

{% block title %}Editar — {{ campaign.title }}{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
  <div class="mb-8">
    <a href="{{ campaign.get_absolute_url }}" class="inline-flex items-center gap-1.5 text-sm text-gray-500 hover:text-gray-700 mb-4">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      Voltar para a campanha
    </a>
    <h1 class="text-2xl font-bold text-gray-900">Editar campanha</h1>
  </div>

  <div class="bg-white rounded-2xl border border-gray-100 shadow-sm p-8">
    <form method="post" enctype="multipart/form-data" novalidate>
      {% csrf_token %}
      <div class="space-y-5">
        {% include "campaigns/_form_fields.html" %}
      </div>
      <div class="mt-8 flex gap-3 justify-end">
        <a href="{{ campaign.get_absolute_url }}" class="px-5 py-2.5 text-sm font-medium text-gray-600 border border-gray-200 rounded-xl hover:border-gray-300 transition">Cancelar</a>
        <button type="submit" class="px-6 py-2.5 bg-primary-500 hover:bg-primary-600 text-white text-sm font-semibold rounded-xl transition-colors">
          Salvar alterações
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
