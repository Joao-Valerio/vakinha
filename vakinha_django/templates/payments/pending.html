{% extends "base.html" %}

{% block title %}Pagamento em processamento{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center py-12 px-4">
  <div class="text-center max-w-md">
    <div class="w-20 h-20 bg-yellow-100 rounded-full flex items-center justify-center mx-auto mb-6">
      <svg class="w-10 h-10 text-yellow-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
    </div>
    <h1 class="text-2xl font-bold text-gray-900 mb-3">Pagamento em processamento</h1>
    <p class="text-gray-500 mb-8">Seu pagamento está sendo processado. Você receberá um e-mail de confirmação assim que for aprovado.</p>
    <a href="{% url 'campaigns:list' %}" class="px-6 py-2.5 text-sm font-semibold text-white bg-primary-500 hover:bg-primary-600 rounded-xl transition-colors">Ver campanhas</a>
  </div>
</div>
{% endblock %}
