<div>
  <label for="{{ field.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1.5">
    {{ field.label }}
    {% if field.field.required %}<span class="text-red-500">*</span>{% endif %}
  </label>
  <input
    type="{{ field.field.widget.input_type }}"
    name="{{ field.html_name }}"
    id="{{ field.id_for_label }}"
    {% if field.value %}value="{{ field.value }}"{% endif %}
    {% for attr, val in field.field.widget.attrs.items %}{{ attr }}="{{ val }}" {% endfor %}
    class="w-full px-4 py-2.5 text-sm border {% if field.errors %}border-red-400 bg-red-50{% else %}border-gray-200{% endif %} rounded-xl focus:outline-none focus:ring-2 focus:ring-primary-400 focus:border-transparent transition"
  />
  {% for error in field.errors %}
  <p class="mt-1 text-xs text-red-600">{{ error }}</p>
  {% endfor %}
  {% if field.help_text %}
  <p class="mt-1 text-xs text-gray-400">{{ field.help_text }}</p>
  {% endif %}
</div>
